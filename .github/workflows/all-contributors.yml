name: all-contributors

# Keeps the Contributors table in the README in sync with the all-contributors
# spec (.all-contributorsrc). New committers are discovered from the GitHub API
# and added automatically as "code"; bots are excluded so no automated account
# is ever credited. Richer contribution types (doc, ideas, infra, test, ...) are
# curated by hand in .all-contributorsrc and preserved here.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC

permissions:
  contents: write

concurrency:
  group: all-contributors-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    # Skip the bot's own sync commit so the workflow never loops on itself.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Add new committers and regenerate the table
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Logins already recognised in the spec (case-insensitive).
          existing=$(node -e "const c=JSON.parse(require('fs').readFileSync('.all-contributorsrc','utf8')).contributors||[];process.stdout.write(c.map(x=>x.login.toLowerCase()).join('\n'))")
          # Committers from the GitHub API, minus bots and merge/web accounts.
          gh api "repos/${GITHUB_REPOSITORY}/contributors?per_page=100" --jq '.[].login' \
            | grep -viE '\[bot\]$|^(web-flow|actions-user|allcontributors)$' \
            | while read -r login; do
                [ -z "$login" ] && continue
                if ! printf '%s\n' "$existing" | grep -qix "$login"; then
                  echo "adding new contributor: $login"
                  npx -y all-contributors-cli@latest add "$login" code
                fi
              done
          npx -y all-contributors-cli@latest generate

      - name: Commit if the table changed
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md .all-contributorsrc; then
            echo "contributors table already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .all-contributorsrc
          git commit -m "docs: update contributors [skip ci]"
          git push
